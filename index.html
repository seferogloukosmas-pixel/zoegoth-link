<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoe Goth</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0612;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        .background-model {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 65vh;
            background: url("https://iili.io/C9yUKFe.md.png") top center / cover no-repeat;
            z-index: 1;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.75;
        }

        .bg-glow {
            position: absolute;
            top: 40vh;
            width: 300px;
            height: 300px;
            background: #8a2be2;
            filter: blur(120px);
            opacity: 0.3;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin-top: 35vh;
            background: rgba(10, 6, 18, 0.7);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .handle {
            font-size: 14px;
            color: #b366ff;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-link {
            display: block;
            width: 100%;
            padding: 15px 20px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-link:active {
            transform: scale(0.98);
        }

        /* Το αληθινό κουμπί με το μωβ/gothic gradient που αναβοσβήνει */
        .btn-main {
            background: linear-gradient(90deg, #8a2be2, #5200cc);
            border: none;
            box-shadow: 0 4px 25px rgba(138, 43, 226, 0.5);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(138, 43, 226, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); }
        }
    </style>
</head>
<body>

    <div class="background-model"></div>
    <div class="bg-glow"></div>

    <div class="container">
        <h1>Zoe Goth</h1>
        <div class="handle">@zoegoth</div>
        
        <div class="links-wrapper">
            <button data-gate="aHR0cHM6Ly93d3cuZmFudnVlLmNvbS96b2Vnb3Ro" onclick="unlock(this)" class="btn-link btn-main">
                Behind The Scenes ❤️
            </button>

            <a href="#" onclick="return false;" class="btn-link">
                Business Inquiries
            </a>

            <a href="#" onclick="return false;" class="btn-link">
                Official Merchandise
            </a>
        </div>
    </div>

    <script>
        function unlock(element) {
            var encoded = element.getAttribute('data-gate');
            var decoded = atob(encoded);
            window.open(decoded, '_blank', 'noopener,noreferrer');
        }
    </script>

</body>
</html>
